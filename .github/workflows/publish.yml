name: Publish

on:
  push:
    tags:
    - '[0-9]+.[0-9]+.[0-9]+'
    - '[A-Za-z0-9]+-service-[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get service name and version
        id: service
        run: |
          echo "service=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 1-2)" >> $GITHUB_OUTPUT
          echo "version=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 3)" >> $GITHUB_OUTPUT

      - name: Print service and version
        run: |
          echo ${{ steps.service.outputs.service }}
          echo ${{ steps.service.outputs.version }}
      - 
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.service.outputs.service }}
          push: false
          load: true
          tags: ${{ steps.service.outputs.service }}:local

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.service.outputs.service }}:local
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.service.outputs.service }}-${{ steps.service.outputs.version }}
          path: sbom.spdx.json

      - name: Scan SBOM with grype
        uses: anchore/scan-action@v3 # evtl 7
        with:
          sbom: sbom.spdx.json
          fail-build: false

      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.service.outputs.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:latest
