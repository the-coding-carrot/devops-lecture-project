# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.7'

    - name: Setup Workspace
      run: go work init ./auth-service ./checkout-service ./product-service

    - name: Build
      run: go build -v ./auth-service/... ./checkout-service/... ./product-service/...

    - name: Test
      run: go test -v -cover ./auth-service/... ./checkout-service/... ./product-service/...

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Bruno
      run: npm install -g @usebruno/cli

    - name: Run docker compose
      uses: hoverkraft-tech/compose-action@4894d2492015c1774ee5a13a95b1072093087ec3 # v2.5.0
      with:
        compose-file: "./docker-compose.yml"

    - name: Run integration tests
      working-directory: ./api-requests/collections/webshop
      run: bru run --env local

    